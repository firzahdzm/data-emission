subnet_id: 56

polling:
  interval_minutes: 72
  request_interval_seconds: 15
  run_on_startup: true

database:
  path: data/emissions.db

web:
  host: 127.0.0.1
  port: 8000

team:
  - name: ExamplePerson
    hotkeys:
      - 5BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB1
      - 5BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB2

# Usernames (must match the Basic-Auth username forwarded by nginx via
# X-Remote-User) that are allowed to Close / Delete settlements. Leave
# the list empty if nobody should have admin powers.
admin_users:
  - replace-with-your-htpasswd-username
